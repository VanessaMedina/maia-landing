<!-- templates/core/dashboard.html -->
{% extends 'public/base_public.html' %}

{% block content %}
<div class="container py-5">
    <h1>Bienvenido/a, {{ user.username }}!</h1>
    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Registrar observación</h5>
                    <p class="card-text">Registra una nueva observación de aula en menos de 20 segundos.</p>
                    <a href="{% url 'registro_maia' %}" class="btn btn-primary">Registrar ahora</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
