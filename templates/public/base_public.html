<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MaIA{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">MaIA</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'about' %}">Sobre MaIA</a>
                <a class="nav-link" href="{% url 'articles' %}">Artículos</a>
                <a class="nav-link" href="{% url 'faq' %}">FAQ</a>
                <a class="btn btn-success" href="/cuenta/login/">Iniciar sesión</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
